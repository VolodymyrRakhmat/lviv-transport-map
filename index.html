<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f6f9; }
        #map { height: 100vh; width: calc(100% - 380px); position: absolute; left: 0; top: 0; }
        #side-panel { position: absolute; top: 0; right: 0; width: 350px; height: 100vh; z-index: 1000; background: white; box-shadow: -4px 0 20px rgba(0,0,0,0.15); display: flex; flex-direction: column; }
        .panel-header { padding: 15px; background: #2c3e50; color: white; }
        .panel-header h3 { margin: 0; font-size: 16px; display: flex; align-items: center; justify-content: space-between; }
        .header-actions { display: flex; gap: 5px; }
        .btn-header { padding: 5px 8px; font-size: 11px; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; text-decoration: none; text-align: center; }
        .btn-admin { background: #e67e22; color: white; }
        .btn-admin:hover { background: #d35400; }
        .btn-map { background: #34495e; color: white; border: 1px solid #576574; }
        .btn-map:hover { background: #2c3e50; }
        
        .tab-content { padding: 15px; flex: 1; overflow-y: auto; }
        .global-controls { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .global-controls button { flex: 1; padding: 6px; font-size: 11px; cursor: pointer; background: #34495e; color: white; border: none; border-radius: 4px; }

        .filter-row, .stats-panel { margin: 12px 0 8px; background: #f8f9fa; padding: 10px; border-radius: 6px; }
        .filter-title { font-weight: bold; margin-bottom: 8px; }
        .checkbox-group { display: flex; flex-direction: column; gap: 6px; max-height: 280px; overflow-y: auto; }

        .type-header { font-weight: bold; padding: 6px 10px; margin-top: 15px; background: #f1f2f6; border-radius: 4px; font-size: 13px; }
        .route-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 5px; margin-top: 5px; }
        .route-btn { padding: 8px 2px; border: 1px solid #dcdde1; border-radius: 6px; text-align: center; cursor: pointer; font-size: 12px; font-weight: 600; background: white; transition: 0.15s; }
        .route-btn:hover { background: #f5f6fa; }
        .route-btn.active { background: #3498db; color: white; border-color: #2980b9; box-shadow: 0 2px 5px rgba(52, 152, 219, 0.4); }
        .route-btn.online { border-bottom: 3px solid #2ecc71; }

        .vehicle-marker-wrapper { position: relative; width: 145px; height: 72px; }
        .vehicle-arrow-box { position: absolute; left: 50%; top: 32%; transform: translate(-50%, -50%); font-size: 24px; z-index: 2; text-shadow: -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff, 1px 1px 0 #fff; }
        .vehicle-title-box { 
            position: absolute; left: 50%; top: 68%; transform: translateX(-50%); 
            background: #ffffff; border: 1px solid #7f8c8d; border-radius: 4px; 
            padding: 2px 8px; font-size: 10.7px; font-weight: bold; color: #2c3e50; 
            white-space: nowrap; box-shadow: 0 2px 8px rgba(0,0,0,0.3); 
            display: flex; align-items: center; gap: 4px;
        }
        .vehicle-marker-wrapper.low-floor .vehicle-title-box { border: 3px solid #2ecc71 !important; }
    </style>
</head>
<body>
<div id="map"></div>
<div id="side-panel">
    <div class="panel-header">
        <h3>
            <div class="header-actions">
                <a href="admin.html" target="_blank" class="btn-header btn-admin">рЯЫ†пЄП –°—В–∞—В–Є—Б—В–Є–Ї–∞</a>
                <button onclick="toggleMap()" class="btn-header btn-map">рЯЧЇпЄП –Ъ–∞—А—В–∞</button>
            </div>
        </h3>
    </div>
    <div id="routes-tab" class="tab-content">
        <button onclick="toggleStats()" style="width:100%; padding:9px; margin:8px 0; background:#3498db; color:white; border:none; border-radius:4px; cursor:pointer; font-weight:bold;">
            рЯУК –Ф–µ—В–∞–ї—М–љ—Ц—И–µ (—Б—В–∞—В–Є—Б—В–Є–Ї–∞ + –Љ–Њ–і–µ–ї—Ц)
        </button>

        <div id="stats-panel" class="stats-panel" style="display:none;">
            <div class="stats-title">–°—В–∞—В–Є—Б—В–Є–Ї–∞ –∞–Ї—В–Є–≤–љ–Є—Е –Ґ–Ч</div>
            <div id="stats-content" style="font-size:13px; line-height:1.5; margin-bottom:12px;"></div>
            
            <div class="filter-title">–§—Ц–ї—М—В—А –њ–Њ –Љ–Њ–і–µ–ї—Ц:</div>
            <div id="model-filters" class="checkbox-group"></div>
        </div>

        <div class="filter-row">
            <div class="filter-title">–§—Ц–ї—М—В—А–Є —Е–∞—А–∞–Ї—В–µ—А–Є—Б—В–Є–Ї:</div>
            <div class="checkbox-group">
                <label class="filter-option"><input type="checkbox" id="filter-ac-full" onchange="applyFilters()"> вЭДпЄП –Ъ–Њ–љ–і–Є—Ж—Ц–Њ–љ–µ—А</label>
                <label class="filter-option"><input type="checkbox" id="filter-ac-one" onchange="applyFilters()"> вЭДпЄП¬љ –Ь–∞–ї–Є–є –Ї–Њ–љ–і–Є—Ж—Ц–Њ–љ–µ—А</label>
                <label class="filter-option"><input type="checkbox" id="filter-vent" onchange="applyFilters()"> рЯМђпЄП –Т–µ–љ—В–Є–ї—П—Ж—Ц—П</label>
                <label class="filter-option"><input type="checkbox" id="filter-low" onchange="applyFilters()"> вЩњ –Э–Є–Ј—М–Ї–∞ –њ—Ц–і–ї–Њ–≥–∞</label>
            </div>
            <button onclick="resetFilters()" style="margin-top:8px; width:100%; padding:6px; background:#95a5a6; color:white; border:none; border-radius:4px; cursor:pointer;">–°–Ї–Є–љ—Г—В–Є –≤—Б—Ц —Д—Ц–ї—М—В—А–Є</button>
        </div>

        <div class="global-controls">
            <button onclick="massSelect(true)">–£–≤—Ц–Љ–Ї–љ—Г—В–Є –≤—Б—Ц</button>
            <button onclick="massSelect(false)">–Т–Є–Љ–Ї–љ—Г—В–Є –≤—Б—Ц</button>
        </div>

        <div class="type-header" style="border-left: 5px solid #e67e22;">рЯЪГ –Ґ—А–∞–Љ–≤–∞—Ч</div>
        <div id="grid-tram" class="route-grid"></div>
        <div class="type-header" style="border-left: 5px solid #9b59b6;">рЯЪО –Ґ—А–Њ–ї–µ–є–±—Г—Б–Є</div>
        <div id="grid-trolley" class="route-grid"></div>
        <div class="type-header" style="border-left: 5px solid #e74c3c;">рЯЪМ –Р–≤—В–Њ–±—Г—Б–Є</div>
        <div id="grid-bus" class="route-grid"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const db = getDatabase(initializeApp({ databaseURL: "https://lviv-transport-web-default-rtdb.firebaseio.com" }));

    const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
    const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

    const map = L.map('map', { center: [49.84, 24.03], zoom: 13, layers: [osm] });

    window.toggleMap = () => map.hasLayer(osm) ? (map.removeLayer(osm), sat.addTo(map)) : (map.removeLayer(sat), osm.addTo(map));

    let markers = {}, routeLines = {}, activeRoutes = new Set(), shapesData = {}, existingButtons = new Set();
    let stopsDict = {};
    let showStats = false;
    let selectedModels = new Set();
    let renderTimeout = null;

    // Debounced render вАФ –≥–Њ–ї–Њ–≤–љ–Є–є —Д—Ц–Ї—Б –Ї–ї—Ц–њ–∞–љ–љ—П
    function debouncedRender(data) {
        if (renderTimeout) clearTimeout(renderTimeout);
        renderTimeout = setTimeout(() => render(data), 130);
    }

    async function loadStops() {
        try {
            const res = await fetch('stops.txt?t=' + Date.now());
            const text = await res.text();
            const lines = text.split('\n');
            lines.forEach(line => {
                if (!line.trim() || line.startsWith('stop_id')) return;
                const parts = line.split(',');
                if (parts.length >= 6) {
                    const stop_id = parts[0].trim();
                    stopsDict[stop_id] = {
                        name: parts[2].trim().replace(/"/g, ''),
                        lat: parseFloat(parts[4]),
                        lon: parseFloat(parts[5])
                    };
                }
            });
        } catch (e) {}
    }
    loadStops();

    const routeDisplayMap = {
        '–Р01': '1A', '–Р03': '3A', '–Р05': '5–Р', '–Р06': '6–Р', '–Р07': '7', '–Р09': '9',
        '–Р10': '10', '–Р11': '11', '–Р12': '12', '–Р14': '14', '–Р15': '15', '–Р16': '16',
        '–Р17': '17', '–Р18': '18', '–Р19': '19', '–Р20': '20', '–Р21': '21', '–Р22': '22',
        '–Р23': '23', '–Р25': '25', '–Р27': '27', '–Р29': '29', '–Р31': '31', '–Р32': '32',
        '–Р33': '33', '–Р34': '34', '–Р37': '37', '–Р39': '39', '–Р40': '40', '–Р41': '41',
        '–Р43': '43', '–Р45': '45', '–Р46': '46', '–Р47': '47–Р', '–Р48': '48', '–Р49': '49–Р',
        '–Р51': '51', '–Р52': '52', '–Р53': '53', '–Р55': '55', '–Р56': '56', '–Р57': '57',
        '–Р58': '58', '–Р59': '59', '–Р60': '60', '–Р61': '61', '–Р62': '62', '–Р63': '63',
        '–Р67': '67', '–Р80': '80', '–Р84': '84', '–Р92': '92', '–Р99': '99', '–Р–Ґ8': '–Ґ8',
        '–Р08–∞': '8A', '–Р39–∞': '39A',
        '–Ґ01': '1', '–Ґ02': '2', '–Ґ03': '3', '–Ґ04': '4', '–Ґ06': '6',
        '–Ґ07': '7', '–Ґ08': '8', '–Ґ09': '9',
        '–Ґ—А22': '22', '–Ґ—А23': '23', '–Ґ—А24': '24', '–Ґ—А25': '25', '–Ґ—А27': '27',
        '–Ґ—А30': '30', '–Ґ—А31': '31', '–Ґ—А32': '32', '–Ґ—А38': '38'
    };

    const allRoutes = {
        tram: ['–Ґ01','–Ґ02','–Ґ03','–Ґ04','–Ґ06','–Ґ07','–Ґ08','–Ґ09'],
        trolley: ['–Ґ—А22','–Ґ—А23','–Ґ—А24','–Ґ—А25','–Ґ—А27','–Ґ—А30','–Ґ—А31','–Ґ—А32','–Ґ—А38'],
        bus: ['–Р01','–Р03','–Р05','–Р06','–Р07','–Р09','–Р10','–Р11','–Р12','–Р14','–Р15','–Р16','–Р17','–Р18','–Р19',
              '–Р20','–Р21','–Р22','–Р23','–Р25','–Р27','–Р29','–Р31','–Р32','–Р33','–Р34','–Р37','–Р39','–Р40','–Р41',
              '–Р43','–Р45','–Р46','–Р47','–Р48','–Р49','–Р51','–Р52','–Р53','–Р55','–Р56','–Р57','–Р58','–Р59','–Р60',
              '–Р61','–Р62','–Р63','–Р67','–Р80','–Р84','–Р92','–Р99','–Р–Ґ8','–Р08–∞','–Р39–∞']
    };

    function getCleanRoute(raw) { if(!raw) return ''; return raw.toString().trim(); }
    function getDisplayName(internalName) { return routeDisplayMap[internalName] || internalName; }

    function createRouteButton(type, internalName) {
        const routeKey = `${type}-${internalName}`;
        if (existingButtons.has(routeKey)) return;
        const grid = document.getElementById(`grid-${type}`);
        if (!grid) return;
        const b = document.createElement('div');
        b.className = 'route-btn';
        b.id = `r-${type}-${internalName}`;
        b.innerText = getDisplayName(internalName);
        b.onclick = () => toggleRoute(type, internalName);
        grid.appendChild(b);
        existingButtons.add(routeKey);
    }

    function initAllRouteButtons() {
        Object.entries(allRoutes).forEach(([type, routes]) => {
            routes.forEach(internalName => createRouteButton(type, internalName));
        });
    }
    initAllRouteButtons();

    window.massSelect = (selectAll) => {
        existingButtons.forEach(routeKey => {
            const [type, internal] = routeKey.split('-');
            const btn = document.getElementById(`r-${type}-${internal}`);
            if (selectAll) {
                activeRoutes.add(routeKey);
                if(btn) btn.classList.add('active');
            } else {
                activeRoutes.delete(routeKey);
                if(btn) btn.classList.remove('active');
            }
        });
        drawRouteLines();
        debouncedRender(window.lastV);
    };

    function toggleRoute(type, internalName) {
        const routeKey = `${type}-${internalName}`;
        const btn = document.getElementById(`r-${type}-${internalName}`);
        if(activeRoutes.has(routeKey)) {
            activeRoutes.delete(routeKey);
            if(btn) btn.classList.remove('active');
        } else {
            activeRoutes.add(routeKey);
            if(btn) btn.classList.add('active');
        }
        drawRouteLines();
        debouncedRender(window.lastV);
    }

    function drawRouteLines() {
        Object.keys(routeLines).forEach(key => {
            if(!activeRoutes.has(key)) {
                map.removeLayer(routeLines[key]);
                delete routeLines[key];
            }
        });
        activeRoutes.forEach(key => {
            if(!routeLines[key] && shapesData[key]) {
                const type = key.split('-')[0];
                let color = type === 'tram' ? '#e67e22' : (type === 'trolley' ? '#9b59b6' : '#e74c3c');
                routeLines[key] = L.polyline(shapesData[key], { color: color, weight: 5, opacity: 0.75 }).addTo(map);
            }
        });
    }

    fetch('mapping.json?t=' + Date.now())
        .then(r => r.json())
        .then(data => { window.mapping = data; console.log('вЬЕ Mapping –Ј–∞–≤–∞–љ—В–∞–ґ–µ–љ–Њ'); })
        .catch(() => console.warn('mapping.json –љ–µ –Ј–љ–∞–є–і–µ–љ–Њ'));

    get(ref(db, 'shapes')).then(snap => {
        if(snap.exists()) {
            const rawShapes = snap.val();
            Object.keys(rawShapes).forEach(rawKey => {
                const name = rawKey.toString().trim();
                let type = name.startsWith('–Ґ—А') ? 'trolley' : (name.startsWith('–Ґ') ? 'tram' : 'bus');
                const clean = getCleanRoute(name);
                if(clean) shapesData[`${type}-${clean}`] = rawShapes[rawKey];
            });
        }
    });

    onValue(ref(db, 'vehicles'), snap => {
        window.lastV = snap.val() || {};
        document.querySelectorAll('.route-btn').forEach(el => el.classList.remove('online'));
        Object.values(window.lastV).forEach(v => {
            if(!v.r) return;
            const cleanR = getCleanRoute(v.r);
            const btn = document.getElementById(`r-${v.type}-${cleanR}`);
            if(btn) btn.classList.add('online');
        });
        debouncedRender(window.lastV);
    });

    function getClimateInfo(climate) {
        if (climate === 3) return { icon: 'вЭДпЄП', text: 'вЭДпЄП –Ъ–Њ–љ–і–Є—Ж—Ц–Њ–љ–µ—А' };
        if (climate === 2) return { icon: 'вЭДпЄП¬љ', text: 'вЭДпЄП¬љ –Љ–∞–ї–Є–є –Ї–Њ–љ–і–Є—Ж—Ц–Њ–љ–µ—А' };
        if (climate === 1) return { icon: 'рЯМђпЄП', text: 'рЯМђпЄП –Т–µ–љ—В–Є–ї—П—Ж—Ц—П' };
        if (climate === 0) return { icon: '', text: '–Т—Ц–і—Б—Г—В–љ—Ц–є –Ї–Њ–љ–і–Є—Ж—Ц–Њ–љ–µ—А' }; 
        if (climate === 4) return { icon: '', text: '–Ъ–Њ–љ–і–Є—Ж—Ц–Њ–љ–µ—А - –љ–µ–≤—Ц–і–Њ–Љ–Њ' };
        return { icon: '', text: '' };
    }

    window.toggleStats = () => {
        showStats = !showStats;
        document.getElementById('stats-panel').style.display = showStats ? 'block' : 'none';
        if (showStats) updateStats();
    };

    function updateStats() {
        const data = window.lastV || {};
        const modelCount = {};
        let filteredCount = 0;
        let lowFloorCount = 0;
        let acFullCount = 0;
        let acOneCount = 0;
        let ventCount = 0;

        Object.entries(data).forEach(([id, v]) => {
            if (!activeRoutes.has(`${v.type}-${getCleanRoute(v.r)}`)) return;
            
            const entry = window.mapping?.[id] || [];
            const lowFloor = entry[1] === 1 || v.low_floor === 1;
            const climate = entry[2] || 0;
            const model = (entry[3] || '–Э–µ–≤—Ц–і–Њ–Љ–∞').toString().trim();
            
            modelCount[model] = (modelCount[model] || 0) + 1;
            filteredCount++;

            if (lowFloor) lowFloorCount++;
            if (climate === 3) acFullCount++;
            if (climate === 2) acOneCount++;
            if (climate === 1) ventCount++;
        });

        let html = `<b>–Т—Б—М–Њ–≥–Њ –љ–∞ –Ї–∞—А—В—Ц:</b> ${Object.keys(data).length}<br>`;
        html += `<b>–Ч –Њ–±—А–∞–љ–Є—Е –Љ–∞—А—И—А—Г—В—Ц–≤:</b> ${filteredCount}<br>`;
        html += `вЩњ –Э–Є–Ј—М–Ї–∞ –њ—Ц–і–ї–Њ–≥–∞: ${lowFloorCount}<br>`;
        html += `вЭДпЄПвЭДпЄП –Я–Њ–≤–љ–Њ—Ж—Ц–љ–љ–Є–є –Ї–Њ–љ–і.: ${acFullCount}<br>`;
        html += `вЭДпЄП –Ю–і–Є–љ –Ї–Њ–љ–і.: ${acOneCount}<br>`;
        html += `рЯМђпЄП –Т–µ–љ—В–Є–ї—П—Ж—Ц—П: ${ventCount}<br><br>`;

        const modelHTML = Object.keys(modelCount).sort().map(model => {
            const safeModel = model.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            return `
                <label class="filter-option">
                    <input type="checkbox" ${selectedModels.has(model) ? 'checked' : ''} 
                           onchange="window.toggleModelFilter('${safeModel}')"> 
                    ${model} <small>(${modelCount[model]})</small>
                </label>
            `;
        }).join('');

        document.getElementById('model-filters').innerHTML = modelHTML;
        document.getElementById('stats-content').innerHTML = html;
    }

    window.toggleModelFilter = (model) => {
        if (selectedModels.has(model)) selectedModels.delete(model);
        else selectedModels.add(model);
        debouncedRender(window.lastV);
    };

    function getFilterState() {
        return {
            acFull: document.getElementById('filter-ac-full').checked,
            acOne: document.getElementById('filter-ac-one').checked,
            vent: document.getElementById('filter-vent').checked,
            low: document.getElementById('filter-low').checked
        };
    }

    window.applyFilters = () => debouncedRender(window.lastV);
    window.resetFilters = () => {
        selectedModels.clear();
        document.getElementById('filter-ac-full').checked = false;
        document.getElementById('filter-ac-one').checked = false;
        document.getElementById('filter-vent').checked = false;
        document.getElementById('filter-low').checked = false;
        debouncedRender(window.lastV);
    };

    function render(data) {
        if(!data) return;

        const filters = getFilterState();
        const anyClimateFilterActive = filters.acFull || filters.acOne || filters.vent;

        // –Т–Є–і–∞–ї—П—Ф–Љ–Њ —В—Ц–ї—М–Ї–Є –љ–µ–њ–Њ—В—А—Ц–±–љ—Ц –Љ–∞—А–Ї–µ—А–Є
        Object.keys(markers).forEach(id => {
            const v = data[id];
            if (!v || !activeRoutes.has(`${v.type}-${getCleanRoute(v.r)}`)) {
                if (markers[id]) map.removeLayer(markers[id]);
                delete markers[id];
            }
        });

        Object.entries(data).forEach(([id, v]) => {
            let cleanR = getCleanRoute(v.r);
            if(!activeRoutes.has(`${v.type}-${cleanR}`)) return;

            const lastUpdated = parseInt(v.last_updated || 0) * 1000;
            const ageSec = Math.floor((Date.now() - lastUpdated) / 1000);
            if (ageSec > 1800) return;

            const mappingEntry = window.mapping?.[id] || [];
            const lowFloor = mappingEntry[1] === 1 || v.low_floor === 1;
            const climate = mappingEntry[2] || 0;
            const model = (mappingEntry[3] || '–Э–µ–≤—Ц–і–Њ–Љ–∞').toString().trim();

            if (selectedModels.size > 0 && !selectedModels.has(model)) {
                if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
                return;
            }

            if (filters.low && !lowFloor) { 
                if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; } 
                return; 
            }

            if (anyClimateFilterActive) {
                let match = false;
                if (filters.acFull && climate === 3) match = true;
                if (filters.acOne && climate === 2) match = true;
                if (filters.vent && climate === 1) match = true;
                if (!match) {
                    if (markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
                    return;
                }
            }

            let displayNumber = v.p || '';
            if (typeof v.p === 'string' && v.p.includes(',')) {
                displayNumber = v.p.split(',')[0].trim();
            } else if (Array.isArray(v.p)) {
                displayNumber = v.p[0] || '';
            }

            let color = v.has_bort 
                ? (v.type === 'tram' ? '#e67e22' : (v.type === 'trolley' ? '#9b59b6' : '#e74c3c')) 
                : '#2c3e50';

            const climateInfo = getClimateInfo(climate);

            const markerHtml = `
                <div class="vehicle-marker-wrapper${lowFloor ? ' low-floor' : ''}">
                    <div class="vehicle-arrow-box" style="transform: rotate(${v.b ?? 0}deg); color:${color};">вђЖпЄП</div>
                    <div class="vehicle-title-box">
                        ${getDisplayName(cleanR)} вАҐ ${displayNumber} ${climateInfo.icon}
                    </div>
                </div>
            `;

            const stopName = stopsDict[v.stop] ? stopsDict[v.stop].name : (v.stop || '–Т –і–Њ—А–Њ–Ј—Ц...');

            const popup = `<div style="font-size:13px; line-height:1.4;">
                <b style="color:${color}">${getDisplayName(cleanR)}</b><br>
                ${model ? `<b>–Ь–Њ–і–µ–ї—М:</b> ${model}<br>` : ''}
                ${lowFloor ? '<span style="color:#2ecc71">вЩњ –Э–Є–Ј—М–Ї–∞ –њ—Ц–і–ї–Њ–≥–∞</span><br>' : ''}
                ${climateInfo.text ? `<span>${climateInfo.text}</span><br>` : ''}
                <b>–Э–Њ–Љ–µ—А:</b> ${displayNumber}<br>
                <b>–Ч—Г–њ–Є–љ–Ї–∞:</b> ${stopName}<br>
                <b>–®–≤–Є–і–Ї—Ц—Б—В—М:</b> ${v.s ?? 0} –Ї–Љ/–≥–Њ–і<br>
                <b>–Ю–љ–Њ–≤–ї–µ–љ–Њ:</b> ${ageSec} —Б–µ–Ї —В–Њ–Љ—Г
            </div>`;

            if (markers[id]) {
                const marker = markers[id];
                marker.setLatLng([v.lat, v.lng]);
                const el = marker.getElement();
                if (el) el.innerHTML = markerHtml;
                marker.setPopupContent(popup);
            } else {
                const icon = L.divIcon({
                    html: markerHtml,
                    className: '',
                    iconSize: [150, 78],
                    iconAnchor: [75, 38]
                });
                markers[id] = L.marker([v.lat, v.lng], {icon}).addTo(map).bindPopup(popup);
            }
        });

        if (showStats) updateStats();
    }

    window.lastV = {};
</script>
</body>
</html>
